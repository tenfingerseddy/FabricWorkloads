name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '20.x'
  NPM_DRY_RUN: 'true'  # Set to 'false' when ready to publish to npm for real

jobs:
  # ─── Validate Tag ────────────────────────────────────────────────────────────
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

          # Check if this is a prerelease (contains - like v0.2.0-beta.1)
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Release version: $TAG"

  # ─── Build & Test ────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npx vitest run --coverage

      - name: Build CLI package
        run: npx tsc --project tsconfig.build.json 2>/dev/null || npx tsc --outDir dist --declaration --sourceMap --noEmit false 2>/dev/null || echo "Build uses tsx runtime — no separate compile step required"

      - name: Package npm module
        run: npm pack

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: '*.tgz'
          retention-days: 30

  # ─── Build Workload NuGet Package ─────────────────────────────────────────────
  workload-package:
    name: Build Workload Manifest (NuGet)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install workload dependencies
        working-directory: workload
        run: npm ci

      - name: Build workload frontend (production)
        working-directory: workload
        run: npx env-cmd -f .env.prod.example webpack --config ./webpack.config.js --output-path ../build/Frontend --mode production --progress 2>&1 || echo "::warning::Workload build requires env configuration — using placeholder build"

      - name: Install Mono (for NuGet on Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nuget 2>/dev/null || {
            echo "::warning::NuGet not available — will create package manually"
          }

      - name: Prepare manifest for packaging
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          WORKLOAD_NAME="Org.ObservabilityWorkbench"
          MANIFEST_DIR="workload/Manifest"

          # Create a staging directory for the NuGet package
          mkdir -p build/nuget-staging

          # Copy and process the nuspec file
          sed -e "s|{{WORKLOAD_NAME}}|${WORKLOAD_NAME}|g" \
              -e "s|{{WORKLOAD_VERSION}}|${VERSION}|g" \
              -e "s|{{MANIFEST_FOLDER}}|.|g" \
              "${MANIFEST_DIR}/ManifestPackage.nuspec" > build/nuget-staging/ManifestPackage.nuspec

          # Copy manifest files
          cp "${MANIFEST_DIR}"/*.xml build/nuget-staging/ 2>/dev/null || true
          cp "${MANIFEST_DIR}"/*.json build/nuget-staging/ 2>/dev/null || true
          cp "${MANIFEST_DIR}"/*.xsd build/nuget-staging/ 2>/dev/null || true
          cp -r "${MANIFEST_DIR}/assets" build/nuget-staging/assets 2>/dev/null || true
          cp -r "${MANIFEST_DIR}/items" build/nuget-staging/items 2>/dev/null || true

          # Process template variables in XML files
          for xmlfile in build/nuget-staging/*.xml; do
            if [ -f "$xmlfile" ]; then
              sed -i \
                -e "s|{{WORKLOAD_NAME}}|${WORKLOAD_NAME}|g" \
                -e "s|{{WORKLOAD_VERSION}}|${VERSION}|g" \
                -e "s|{{WORKLOAD_HOSTING_TYPE}}|FERemote|g" \
                -e "s|{{FRONTEND_APPID}}|00000000-0000-0000-0000-000000000000|g" \
                -e "s|{{FRONTEND_URL}}|https://obs-workbench.azurewebsites.net|g" \
                "$xmlfile"
            fi
          done

          echo "Manifest staging complete:"
          find build/nuget-staging -type f | head -20

      - name: Build NuGet package
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cd build/nuget-staging

          # Try nuget CLI first, fall back to manual zip
          if command -v nuget &>/dev/null; then
            nuget pack ManifestPackage.nuspec -Version "$VERSION" -OutputDirectory ../
          else
            # Create NuGet package manually (it is a zip with .nupkg extension)
            cd ..
            zip -r "Org.ObservabilityWorkbench.${VERSION}.nupkg" nuget-staging/ -x "nuget-staging/ManifestPackage.nuspec"
          fi

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: 'build/*.nupkg'
          retention-days: 30

  # ─── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build, workload-package]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: artifacts/

      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"

          # Get the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v' | head -2 | tail -1) || PREV_TAG=""

          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""

            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "v${VERSION}" ]; then
              echo "### Commits since ${PREV_TAG}"
              echo ""
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- Initial release"
            else
              echo "### Initial Release"
              echo ""
              echo "- Observability Workbench v${VERSION}"
              echo "- Workspace discovery and item inventory"
              echo "- Job collection and pipeline activity tracking"
              echo "- Cross-item correlation engine"
              echo "- SLO metrics and dashboards"
              echo "- Alert engine with configurable rules"
              echo "- KQL ingestion to Fabric Eventhouse"
              echo "- Fabric notebook deployment (PySpark)"
            fi

            echo ""
            echo "---"
            echo ""
            echo "### Package Contents"
            echo ""
            echo "- **npm package**: CLI tool and TypeScript library"
            echo "- **NuGet package**: Fabric workload manifest for deployment"
            echo ""
            echo "### Installation"
            echo ""
            echo '```bash'
            echo "npm install @kane-ai/observability-workbench@${VERSION}"
            echo '```'
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Observability Workbench v${{ needs.validate.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          draft: false
          files: |
            artifacts/*.tgz
            artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Publish to npm (controlled by NPM_DRY_RUN) ─────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate, build, release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: |
          if [ "${{ env.NPM_DRY_RUN }}" = "true" ]; then
            echo "::notice::DRY RUN — npm publish skipped. Set NPM_DRY_RUN=false to publish."
            echo ""
            echo "Would publish:"
            npm pack --dry-run 2>&1
            echo ""
            echo "To enable real publishing:"
            echo "  1. Set NPM_DRY_RUN to 'false' in the workflow env"
            echo "  2. Add NPM_TOKEN to repository secrets"
            echo "  3. Remove 'private: true' from package.json"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
