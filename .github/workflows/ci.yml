name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PRIMARY_NODE_VERSION: '20.x'

jobs:
  # ─── Security Audit ──────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high || true

      - name: Audit all dependencies (warn on moderate, fail on critical)
        run: |
          echo "::group::Full dependency audit"
          npm audit --audit-level=critical 2>&1 || {
            echo "::error::Critical vulnerability found in dependencies"
            exit 1
          }
          echo "::endgroup::"
          echo "::group::Moderate vulnerability check (informational)"
          npm audit --audit-level=moderate 2>&1 || {
            echo "::warning::Moderate vulnerabilities found — review before release"
          }
          echo "::endgroup::"

  # ─── Build & Test (Matrix) ────────────────────────────────────────────────────
  build:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-${{ matrix.node-version }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Typecheck (CLI tool)
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npx vitest run --coverage --reporter=verbose
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Report coverage summary
        if: matrix.node-version == '20.x'
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const c = require('./coverage/coverage-summary.json');
              const t = c.total;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + t.statements.pct + '% |');
              console.log('| Branches | ' + t.branches.pct + '% |');
              console.log('| Functions | ' + t.functions.pct + '% |');
              console.log('| Lines | ' + t.lines.pct + '% |');
            " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "Coverage summary not available" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Notebook Validation (parallel) ──────────────────────────────────────────
  notebooks:
    name: Validate Notebooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-20.x-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-20.x-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Validate notebook structure and syntax
        run: npm run validate:notebooks

      - name: Check notebook file sizes
        run: |
          echo "## Notebook File Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Notebook | Size | Lines |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          for nb in products/observability-workbench/notebooks/*.py; do
            if [ -f "$nb" ]; then
              name=$(basename "$nb")
              size=$(wc -c < "$nb" | tr -d ' ')
              lines=$(wc -l < "$nb" | tr -d ' ')
              size_kb=$(echo "scale=1; $size / 1024" | bc)
              echo "| $name | ${size_kb}KB | $lines |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  # ─── Workload Bundle Size Check ──────────────────────────────────────────────
  bundle-check:
    name: Workload Bundle Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Cache workload node_modules
        uses: actions/cache@v4
        id: cache-workload-modules
        with:
          path: workload/node_modules
          key: workload-modules-${{ runner.os }}-${{ hashFiles('workload/package-lock.json') }}
          restore-keys: |
            workload-modules-${{ runner.os }}-

      - name: Install workload dependencies
        if: steps.cache-workload-modules.outputs.cache-hit != 'true'
        working-directory: workload
        run: npm ci

      - name: Build workload (production)
        working-directory: workload
        run: npx env-cmd -f .env.test.example webpack --config ./webpack.config.js --output-path ./dist --mode production --progress 2>&1 || true

      - name: Check bundle size
        working-directory: workload
        run: |
          THRESHOLD_KB=2048
          WARN_KB=1536

          echo "## Workload Bundle Size" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -d dist ]; then
            TOTAL_SIZE=0
            echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"

            for f in dist/*.js dist/*.css; do
              if [ -f "$f" ]; then
                SIZE=$(wc -c < "$f" | tr -d ' ')
                SIZE_KB=$(echo "scale=1; $SIZE / 1024" | bc)
                TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
                echo "| $(basename "$f") | ${SIZE_KB}KB |" >> "$GITHUB_STEP_SUMMARY"
              fi
            done

            TOTAL_KB=$((TOTAL_SIZE / 1024))
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Total bundle size: ${TOTAL_KB}KB** (threshold: ${THRESHOLD_KB}KB)" >> "$GITHUB_STEP_SUMMARY"

            if [ "$TOTAL_KB" -gt "$THRESHOLD_KB" ]; then
              echo "::error::Bundle size ${TOTAL_KB}KB exceeds threshold ${THRESHOLD_KB}KB"
              exit 1
            elif [ "$TOTAL_KB" -gt "$WARN_KB" ]; then
              echo "::warning::Bundle size ${TOTAL_KB}KB approaching threshold ${THRESHOLD_KB}KB"
            else
              echo "Bundle size ${TOTAL_KB}KB is within limits"
            fi
          else
            echo "::warning::Workload build produced no dist directory — bundle size check skipped"
            echo "Build did not produce output (this is expected if env vars are not configured)" >> "$GITHUB_STEP_SUMMARY"
          fi
